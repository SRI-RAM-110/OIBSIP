<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <div class="display">
        <div id="expression" class="expression"></div>
        <div id="result" class="result">0</div>
    </div>

    <div class="buttons">
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button onclick="useAns()">ans</button>
        <button onclick="deleteLast()">del</button>
        <button onclick="clearDisplay()">clear</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('%')" class="operator">%</button>
        <button onclick="appendValue('Math.sqrt(')" class="operator">√</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('*')" class="operator">x</button>
        <button onclick="appendValue('/')" class="operator">÷</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')" class="operator">+</button>
        <button onclick="appendValue('-')" class="operator">−</button>

        <button onclick="appendValue('.')">.</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="toggleSign()" class="operator">±</button>
        <button onclick="calculate()" class="enter">ENTER</button>
    </div>
</div>

<script>
let expression = "";
let lastAnswer = 0;

const expressionDisplay = document.getElementById("expression");
const resultDisplay = document.getElementById("result");

function appendValue(value) {
    expression += value;
    expressionDisplay.textContent = expression;
}

function clearDisplay() {
    expression = "";
    expressionDisplay.textContent = "";
    resultDisplay.textContent = "0";
}

function deleteLast() {
    expression = expression.slice(0, -1);
    expressionDisplay.textContent = expression;
}

function calculate() {
    try {
        let result = eval(expression);
        resultDisplay.textContent = result;
        lastAnswer = result;
    } catch {
        resultDisplay.textContent = "Error";
    }
}

function useAns() {
    expression += lastAnswer;
    expressionDisplay.textContent = expression;
}

function toggleSign() {
    try {
        let result = eval(expression);
        result = -result;
        expression = result.toString();
        expressionDisplay.textContent = expression;
        resultDisplay.textContent = result;
    } catch {
        resultDisplay.textContent = "Error";
    }
}
</script>

</body>
</html>
